server:
  port: ${PORT:8080}

spring:
  application:
    name: dfs-gateway

  # ── Multipart upload limits ──────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dfs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:dfs_user}
    password: ${DB_PASSWORD:dfs_secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ── Google OAuth2 ────────────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dfs-super-secret-jwt-key-minimum-256-bits-long-for-hs256-algorithm}
  expiration: 86400000

# Storage Node Registry
storage:
  nodes:
    - id: "node-1"
      url: ${NODE_1_URL:http://localhost:8081}
      zone: "zone-a"
    - id: "node-2"
      url: ${NODE_2_URL:http://localhost:8082}
      zone: "zone-b"
    - id: "node-3"
      url: ${NODE_3_URL:http://localhost:8083}
      zone: "zone-c"
  replication-factor: 2
  chunk-size-bytes: 1048576
  health-check-interval: 30000
  node-timeout: 5000

# Soft delete retention
file:
  soft-delete:
    retention-days: 30

# CORS allowed origins
app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.dfs: DEBUG
    org.springframework.security: INFO