# ── Default (Node 1) ──────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${NODE_ID:dfs-storage-node-1}
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      enabled: true

# NO quotes around the secret — must be plain string to match gateway
jwt:
  secret: ${JWT_SECRET:dfs-super-secret-jwt-key-minimum-256-bits-long-for-hs256-algorithm}

node:
  id:             ${NODE_ID:node-1}
  zone:           ${NODE_ZONE:zone-a}
  storage-root:   ${NODE_STORAGE_ROOT:C:/dfs/node-1}
  total-capacity: 107374182400

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.dfs.node: DEBUG

---
# ── Node 2 profile ────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: node2
  application:
    name: dfs-storage-node-2

server:
  port: 8082

node:
  id:           node-2
  zone:         zone-b
  storage-root: ${NODE_STORAGE_ROOT:C:/dfs/node-2}

---
# ── Node 3 profile ────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: node3
  application:
    name: dfs-storage-node-3

server:
  port: 8083

node:
  id:           node-3
  zone:         zone-c
  storage-root: ${NODE_STORAGE_ROOT:C:/dfs/node-3}